name: Verify scrape sources

# Weekly config-health check: every DIRECTORY_SOURCE / SPONSOR_SEED URL must
# still return HTML 2xx and pass robots.txt, and every template must render.
# Sends nothing, writes nothing — dead sources surface here instead of
# silently wasting a scheduled scrape cycle. Needs no secrets to run; the
# alert fallback uses the existing SMTP account (no third-party service).

on:
  schedule:
    # Mondays 12:00 UTC (~2 min/run — negligible against the free tier).
    - cron: "0 12 * * 1"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Verify sources, robots.txt, and templates
        run: npx tsx src/cli.ts verify

      - name: Alert on failure (own SMTP)
        if: failure()
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SENDER_NAME: ${{ secrets.SENDER_NAME }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: npx tsx src/cli.ts alert-failure
