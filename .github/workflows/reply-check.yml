name: Reply check + follow-up

# Runs several times a day: detect replies, send the single follow-up to rows
# that have waited long enough, and retire stale rows to `cold`.

on:
  schedule:
    # Every 4 hours.
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Log intended actions without sending or writing"
        type: boolean
        default: false

# Share the write lock with the daily job so the two never race on the Sheet.
concurrency:
  group: outreach-write
  cancel-in-progress: false

jobs:
  reply-and-followup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Reply check + follow-up
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          IMAP_HOST: ${{ secrets.IMAP_HOST }}
          IMAP_PORT: ${{ secrets.IMAP_PORT }}
          IMAP_SECURE: ${{ secrets.IMAP_SECURE }}
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_PASS: ${{ secrets.IMAP_PASS }}
          IMAP_SENT_MAILBOX: ${{ secrets.IMAP_SENT_MAILBOX }}
          IMAP_INBOX_MAILBOX: ${{ secrets.IMAP_INBOX_MAILBOX }}
          SENDER_NAME: ${{ secrets.SENDER_NAME }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          REPLY_TO_EMAIL: ${{ secrets.REPLY_TO_EMAIL }}
          UNSUBSCRIBE_URL: ${{ secrets.UNSUBSCRIBE_URL }}
          LOG_TO_SHEET: "true"
          DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
        run: npx tsx src/cli.ts run-replies
