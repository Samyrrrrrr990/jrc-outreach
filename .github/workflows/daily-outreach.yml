name: Daily outreach (scrape + send)

# Runs once a day: restock the CRM, then send today's quota of initial emails.
# A non-zero exit fails the run visibly rather than silently skipping a day.

on:
  schedule:
    # 13:10 UTC daily (~09:10 America/Toronto in summer). Adjust as needed.
    - cron: "10 13 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Log intended actions without sending or writing"
        type: boolean
        default: false

# Never let two daily runs overlap and race on the Sheet.
concurrency:
  group: outreach-write
  cancel-in-progress: false

jobs:
  scrape-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Run tests (fail fast on regressions)
        run: npm test

      - name: Scrape + send
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          IMAP_HOST: ${{ secrets.IMAP_HOST }}
          IMAP_PORT: ${{ secrets.IMAP_PORT }}
          IMAP_SECURE: ${{ secrets.IMAP_SECURE }}
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_PASS: ${{ secrets.IMAP_PASS }}
          IMAP_SENT_MAILBOX: ${{ secrets.IMAP_SENT_MAILBOX }}
          IMAP_INBOX_MAILBOX: ${{ secrets.IMAP_INBOX_MAILBOX }}
          SENDER_NAME: ${{ secrets.SENDER_NAME }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          REPLY_TO_EMAIL: ${{ secrets.REPLY_TO_EMAIL }}
          UNSUBSCRIBE_URL: ${{ secrets.UNSUBSCRIBE_URL }}
          LOG_TO_SHEET: "true"
          DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
        run: npx tsx src/cli.ts run-daily
