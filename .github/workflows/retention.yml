name: Retention report

# Monthly: email a report of cold rows past RETENTION_DAYS (default 365).
# REPORT ONLY on the schedule — purging is deliberately manual: trigger this
# workflow by hand with purge=true after reading the report. do_not_contact
# and replied rows are never purged (DATA_RETENTION.md). ~2 min/run.

on:
  schedule:
    # 1st of the month, 12:30 UTC.
    - cron: "30 12 1 * *"
  workflow_dispatch:
    inputs:
      purge:
        description: "Actually delete rows past retention (irreversible)"
        type: boolean
        default: false

concurrency:
  group: outreach-write
  cancel-in-progress: false

jobs:
  retention:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Retention report (purge only when manually requested)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          IMAP_HOST: ${{ secrets.IMAP_HOST }}
          IMAP_PORT: ${{ secrets.IMAP_PORT }}
          IMAP_SECURE: ${{ secrets.IMAP_SECURE }}
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_PASS: ${{ secrets.IMAP_PASS }}
          IMAP_SENT_MAILBOX: ${{ secrets.IMAP_SENT_MAILBOX }}
          IMAP_INBOX_MAILBOX: ${{ secrets.IMAP_INBOX_MAILBOX }}
          SENDER_NAME: ${{ secrets.SENDER_NAME }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          REPLY_TO_EMAIL: ${{ secrets.REPLY_TO_EMAIL }}
          UNSUBSCRIBE_URL: ${{ secrets.UNSUBSCRIBE_URL }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          RETENTION_DAYS: ${{ vars.RETENTION_DAYS }}
        run: npx tsx src/cli.ts retention --email ${{ inputs.purge == true && '--purge' || '' }}

      - name: Alert on failure (own SMTP)
        if: failure()
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SENDER_NAME: ${{ secrets.SENDER_NAME }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: |
          if [ ! -f .alert-sent ]; then
            npx tsx src/cli.ts alert-failure
          fi
